[core]
# The home folder for airflow, default is ~/airflow
# airflow_home is set via AIRFLOW_HOME environment variable

# The folder where your airflow pipelines live
dags_folder = D:\ITI - Data Engineering\Data warehouse concepts and Lakehouse Architecture\dbt\dbt_snowflake_airflow_etl_pipeline\dags

# The folder where airflow should store its log files
base_log_folder = D:\ITI - Data Engineering\Data warehouse concepts and Lakehouse Architecture\dbt\dbt_snowflake_airflow_etl_pipeline\airflow_home\logs

# Airflow can store logs remotely in AWS S3, Google Cloud Storage or Elastic Search.
# Users must supply an Airflow connection id that provides access to the storage
# location. If remote_logging is set to true, see UPDATING.md for additional
# configuration requirements.
remote_logging = False

# Logging level
logging_level = INFO

# The executor class that airflow should use. Choices include
# SequentialExecutor, LocalExecutor, CeleryExecutor, DaskExecutor, KubernetesExecutor
executor = SequentialExecutor

# The SqlAlchemy connection string to the metadata database.
# For SQLite (default):
sql_alchemy_conn = sqlite:///D:\ITI - Data Engineering\Data warehouse concepts and Lakehouse Architecture\dbt\dbt_snowflake_airflow_etl_pipeline\airflow_home\airflow.db

# The amount of parallelism as a setting to the executor. This defines
# the max number of task instances that should run simultaneously
# on this airflow installation
parallelism = 32

# The number of task instances allowed to run concurrently by the scheduler
dag_concurrency = 16

# Are DAGs paused by default at creation
dags_are_paused_at_creation = True

# The maximum number of active DAG runs per DAG
max_active_runs_per_dag = 16

# Whether to load the examples that ship with Airflow
load_examples = False

# Where your Airflow plugins are stored
plugins_folder = D:\ITI - Data Engineering\Data warehouse concepts and Lakehouse Architecture\dbt\dbt_snowflake_airflow_etl_pipeline\airflow_home\plugins

[webserver]
# The base url of your website as airflow cannot guess what domain or
# cname you are using. This is used in automated emails that
# airflow sends to point links to the right web server
base_url = http://localhost:8080

# The ip specified when starting the web server
web_server_host = 0.0.0.0

# The port on which to run the web server
web_server_port = 8080

# Secret key used to run your flask app
secret_key = your_secret_key_here

[scheduler]
# Task instances listen for external kill signal (when you `airflow tasks kill`)
# on this port
child_process_timeout = 600

# The scheduler can run multiple processes in parallel to parse dags.
# This is defined by the number of schedule processes, though the scheduler
# also takes parallelism into account.
max_threads = 2

# Turn off scheduler use of cgroups on systems that don't support it.
enable_xcom_pickling = False
