
version: 2

sources:
  - name: finance_raw
    description: "Raw finance data from Snowflake"
    database: finance_db
    schema: raw
    tables:
      - name: orders
        columns:
          - name: id
          - name: customer_id
          - name: order_date
          - name: status
      - name: customers
        columns:
          - name: id
          - name: name
          - name: email
          - name: country
      - name: products
        columns:
          - name: id
          - name: name
          - name: category
          - name: price
      - name: order_items
        columns:
          - name: id
          - name: order_id
          - name: product_id
          - name: quantity
          - name: unit_price
