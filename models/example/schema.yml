
version: 2

sources:
  - name: finance_raw
    description: "Raw finance data from Snowflake"
    database: FINANCE_DB
    schema: DBT_DEV_RAW_RAW
    tables:
      - name: orders
        columns:
          - name: id
          - name: customer_id
          - name: order_date
          - name: status
      - name: customers
        columns:
          - name: id
          - name: name
          - name: email
          - name: country
      - name: products
        columns:
          - name: id
          - name: name
          - name: category
          - name: price
      - name: order_items
        columns:
          - name: id
          - name: order_id
          - name: product_id
          - name: quantity
          - name: unit_price

models:
  - name: stg_customers
    description: "Staging table for customers with clean data"
    columns:
      - name: customer_id
        description: "Primary key for customers"
      - name: customer_name
        description: "Customer full name"
      - name: email
        description: "Customer email address"
      - name: country
        description: "Customer country"

  - name: stg_products
    description: "Staging table for products with clean data"
    columns:
      - name: product_id
        description: "Primary key for products"
      - name: product_name
        description: "Product name"
      - name: product_category
        description: "Product category"
      - name: price
        description: "Product price"

  - name: stg_orders
    description: "Staging table for orders with clean data"
    columns:
      - name: order_id
        description: "Primary key for orders"
      - name: customer_id
        description: "Foreign key to customers"
      - name: order_date
        description: "Order date"
      - name: order_status
        description: "Order status"

  - name: stg_order_items
    description: "Staging table for order items with clean data"
    columns:
      - name: item_id
        description: "Primary key for order items"
      - name: order_id
        description: "Foreign key to orders"
      - name: product_id
        description: "Foreign key to products"
      - name: quantity
        description: "Quantity ordered"
      - name: unit_price
        description: "Unit price"
      - name: total_price
        description: "Total price (quantity * unit_price)"

  - name: fct_daily_order_revenue
    description: "Fact table for daily order revenue"
    columns:
      - name: order_date
        description: "Order date"
      - name: order_id
        description: "Order ID"
      - name: total_order_value
        description: "Total revenue for the order"
